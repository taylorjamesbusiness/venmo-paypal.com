<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay Rose | Premium Crypto Checkout</title>

    <!-- PYUSD favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230066CC'/><text x='50' y='62' font-size='52' font-weight='900' font-family='Arial,sans-serif' text-anchor='middle' fill='white'>%24</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        :root {
            --bg: #050508;
            --solana: #14F195;
            --solana2: #9945FF;
            --verified: #0095f6;
            --text: #fff;
            --text-dim: #555;
            --border: rgba(255,255,255,0.07);
            --accent-pill: linear-gradient(135deg, #1BFF9E, #00D1FF);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            padding: 8px 12px 12px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(ellipse, rgba(20,241,149,0.04) 0%, transparent 70%);
            pointer-events: none;
            animation: bgPulse 8s ease-in-out infinite;
        }
        @keyframes bgPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

        .wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 1;
            transform: translateY(-26px); /* layout উপরে তোলা */
        }

        /* ===== HEADER ===== */
        .header { text-align: center; padding-top: 2px; }
        .brand {
            font-size: 30px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 4px; letter-spacing: -0.5px;
        }
        .verified-icon { width: 22px; height: 22px; animation: verifiedPop 3s ease-in-out infinite; }
        @keyframes verifiedPop {
            0%,100% { filter: drop-shadow(0 0 3px var(--verified)) brightness(1); transform: scale(1); }
            50% { filter: drop-shadow(0 0 10px var(--verified)) brightness(1.3); transform: scale(1.1); }
        }
        .tagline {
            font-size: 10px; color: var(--text-dim); font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .tagline-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--solana); display: inline-block;
            animation: blink 2s ease-in-out infinite;
            box-shadow: 0 0 6px var(--solana);
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ===== CARD ===== */
        .card {
            background: linear-gradient(160deg, #141420 0%, #0a0a12 60%, #0d1020 100%);
            border-radius: 28px;
            padding: 26px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 0 1px rgba(20,241,149,0.04), 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.025), transparent);
            animation: shimmer 5s ease-in-out infinite 1s;
        }
        @keyframes shimmer { 0% { left: -100%; } 40%,100% { left: 150%; } }
        .card::after {
            content: ''; position: absolute;
            bottom: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(153,69,255,0.08) 0%, rgba(20,241,149,0.04) 40%, transparent 70%);
            pointer-events: none;
        }

        .card-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; position: relative; z-index: 1;
        }
        .card-logos { display: flex; gap: 12px; align-items: center; }

        .paypal-wrap { position: relative; display: flex; align-items: center; }
        .paypal-wrap::after {
            content: ''; position: absolute; inset: -5px; border-radius: 8px;
            background: radial-gradient(circle, rgba(0,112,186,0.25), transparent);
            animation: ppGlow 3s ease-in-out infinite; pointer-events: none;
        }
        @keyframes ppGlow { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        .card-logo-img { height: 20px; width: auto; position: relative; z-index: 1; }

        .venmo-brand {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .venmo-fake-logo {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            background: linear-gradient(135deg, #00A8FF, #006DFF);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06),
                0 0 12px rgba(0,140,255,0.55);
            position: relative;
            overflow: hidden;
        }
        .venmo-fake-logo::before {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.18);
        }
        .venmo-fake-v {
            font-size: 13px;
            font-weight: 900;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .venmo-text-top {
            font-size: 13px;
            font-weight: 800;
            text-transform: lowercase;
            color: #e5f4ff;
            letter-spacing: 0.2px;
            position: relative;
        }
        .venmo-text-top::after {
            content: '';
            position: absolute;
            left: 0; bottom: -1px;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.0), rgba(255,255,255,0.65), rgba(255,255,255,0.0));
            transform-origin: left;
            transform: scaleX(0);
            animation: venmoUnderline 3s ease-in-out infinite 0.4s;
        }
        @keyframes venmoUnderline {
            0%,40% { transform: scaleX(0); }
            55%,80% { transform: scaleX(1); }
            100% { transform: scaleX(0); }
        }

        .solana-tag {
            background: linear-gradient(135deg, rgba(20,241,149,0.1) 0%, rgba(153,69,255,0.08) 100%);
            border: 1px solid rgba(20,241,149,0.25);
            padding: 7px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px;
            box-shadow: 0 0 12px rgba(20,241,149,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
            animation: solanaPulse 4s ease-in-out infinite;
        }
        @keyframes solanaPulse {
            0%,100% { box-shadow: 0 0 8px rgba(20,241,149,0.08); border-color: rgba(20,241,149,0.25); }
            50% { box-shadow: 0 0 18px rgba(20,241,149,0.22); border-color: rgba(20,241,149,0.5); }
        }
        .solana-tag span { font-size: 10px; font-weight: 800; color: #14F195; letter-spacing: 1px; }

        .card-body { position: relative; z-index: 1; }
        .card-body h4 {
            font-size: 10px; color: #444; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 12px; font-weight: 600;
        }
        .pyusd-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }

        .pyusd-logo-wrap {
            width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #0066CC, #0047AB);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 18px rgba(0,102,204,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
            animation: pyusdGlow 3s ease-in-out infinite;
            position: relative; overflow: hidden;
        }
        .pyusd-logo-wrap::before {
            content: ''; position: absolute; inset: 2px; border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.15);
        }
        @keyframes pyusdGlow {
            0%,100% { box-shadow: 0 0 12px rgba(0,102,204,0.35); }
            50% { box-shadow: 0 0 24px rgba(0,102,204,0.7); }
        }
        .pyusd-info { display: flex; flex-direction: column; gap: 3px; }
        .pyusd-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
        .pyusd-sub { font-size: 10px; color: #555; font-weight: 600; letter-spacing: 0.5px; }

        .network-badge {
            padding: 9px 14px;
            background: rgba(20,241,149,0.03);
            border: 1px solid rgba(20,241,149,0.1);
            border-radius: 14px;
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; color: #555; font-weight: 600;
        }
        .network-badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--solana); box-shadow: 0 0 6px var(--solana);
            animation: blink 2s ease-in-out infinite; flex-shrink: 0;
        }
        .network-badge .sol-label { color: #14F195; font-weight: 700; }
        .network-badge .sep { color: #333; }

        /* ===== SELECTION ===== */
        .selection {
            background: linear-gradient(160deg, #101018, #0c0c14);
            border-radius: 24px; padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .sel-label {
            font-size: 10px; color: #444; letter-spacing: 2px;
            text-transform: uppercase; font-weight: 700; margin-bottom: 12px;
        }
        .amounts {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 12px;
        }
        .amt-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 14px 0;
            color: #aaa; font-size: 17px; font-weight: 700;
            cursor: pointer; transition: all 0.2s cubic-bezier(.4,0,.2,1);
            font-family: inherit; position: relative; overflow: hidden;
        }
        .amt-btn:hover { color: #fff; border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
        .amt-btn.active {
            background: var(--accent-pill);
            color: #02140d;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(0, 240, 180, 0.35);
            transform: translateY(-2px);
        }

        .custom-wrap { position: relative; }
        .custom-wrap .dollar {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: #444; font-weight: 700; font-size: 16px;
        }
        .custom-input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
            padding: 15px 16px 15px 32px; color: #fff;
            font-size: 15px; font-weight: 600; outline: none; font-family: inherit;
            transition: all 0.2s;
        }
        .custom-input::placeholder { color: #333; }
        .custom-input:focus {
            border-color: rgba(20,241,149,0.3); background: rgba(20,241,149,0.03);
            box-shadow: 0 0 0 3px rgba(20,241,149,0.06);
        }

        /* ===== BUTTONS ===== */
        .btn-list { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            font-size: 16px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s cubic-bezier(.4,0,.2,1);
            font-family: inherit; position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.4s;
        }
        .btn:hover::after { left: 150%; }
        .btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; }
        .btn:disabled::after { display: none; }

        .btn-pp {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            color: #003087;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .btn-pp:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

        .btn-vm {
            background: linear-gradient(135deg, #008CFF, #006ACC);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,140,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-vm:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,140,255,0.45); }

        .btn-logo-only {
            height: 24px;
            width: auto;
        }

        .venmo-btn-content {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .venmo-text-btn {
            font-size: 15px;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: 0.3px;
        }

        .btn.loading::before {
            content: ''; position: absolute;
            width: 20px; height: 20px;
            border: 2.5px solid rgba(0,0,0,0.15);
            border-top-color: currentColor; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn.loading img,
        .btn.loading .venmo-btn-content {
            opacity: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center; font-size: 10px; color: #2a2a2a;
            display: flex; align-items: center; justify-content: center;
            gap: 6px; padding-bottom: 2px;
        }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- Header -->
    <div class="header">
        <div class="brand">
            Pay Rose
            <svg class="verified-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L13.8 5.3L17.5 4L17.2 7.9L21 9L19.2 12.3L21 15.6L17.2 16.7L17.5 20.6L13.8 19.3L12 22.6L10.2 19.3L6.5 20.6L6.8 16.7L3 15.6L4.8 12.3L3 9L6.8 7.9L6.5 4L10.2 5.3L12 2Z" fill="#0095f6"/>
                <path d="M8.5 12.5L11 15L15.5 10" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="tagline">
            <span class="tagline-dot"></span>
            Verified Crypto Checkout
            <span class="tagline-dot"></span>
        </p>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-top">
            <div class="card-logos">
                <div class="paypal-wrap">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"
                         class="card-logo-img" alt="PayPal">
                </div>
                <div class="venmo-brand">
                    <div class="venmo-fake-logo">
                        <span class="venmo-fake-v">V</span>
                    </div>
                    <span class="venmo-text-top">venmo</span>
                </div>
            </div>

            <div class="solana-tag">
                <svg width="14" height="14" viewBox="0 0 397 311">
                    <defs>
                        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#14F195"/>
                            <stop offset="100%" stop-color="#9945FF"/>
                        </linearGradient>
                    </defs>
                    <path d="M64.6 237.9c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6c-2.4-2.4-5.7-3.7-9.2-3.7H4.6c-5.8 0-8.7 7-4.6 11.1l64.6 64.6z" fill="url(#sg)"/>
                    <path d="M332.4 73.1c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6z" fill="url(#sg)"/>
                    <path d="M332.4 155.5c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6z" fill="url(#sg)"/>
                </svg>
                <span>SOLANA</span>
            </div>
        </div>

        <div class="card-body">
            <h4>Asset Support</h4>
            <div class="pyusd-row">
                <div class="pyusd-logo-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="11" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
                        <text x="6.5" y="16.5" font-size="13" font-weight="900"
                              font-family="Arial,Helvetica,sans-serif" fill="white">P</text>
                        <text x="14" y="11" font-size="7" font-weight="700"
                              font-family="Arial,Helvetica,sans-serif" fill="rgba(255,255,255,0.7)">Y</text>
                    </svg>
                </div>
                <div class="pyusd-info">
                    <div class="pyusd-name">PYUSD Stablecoin</div>
                    <div class="pyusd-sub">PayPal USD · 1:1 USD Peg</div>
                </div>
            </div>

            <div class="network-badge">
                <div class="network-badge-dot"></div>
                <svg width="12" height="12" viewBox="0 0 397 311" style="flex-shrink:0">
                    <defs>
                        <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#14F195"/>
                            <stop offset="100%" stop-color="#9945FF"/>
                        </linearGradient>
                    </defs>
                    <path d="M64.6 237.9c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6c-2.4-2.4-5.7-3.7-9.2-3.7H4.6c-5.8 0-8.7 7-4.6 11.1l64.6 64.6z" fill="url(#sg2)"/>
                    <path d="M332.4 73.1c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6z" fill="url(#sg2)"/>
                    <path d="M332.4 155.5c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6z" fill="url(#sg2)"/>

                <span class="sep">·</span>

                <span class="sep">·</span>
                &lt;$0.01 fee
            </div>
        </div>
    </div>

    <!-- Amount Selection -->
    <div class="selection">
        <p class="sel-label">Select Amount</p>
        <div class="amounts">
            <button class="amt-btn" data-amt="10">$10</button>
            <button class="amt-btn" data-amt="25">$25</button>
            <button class="amt-btn" data-amt="50">$50</button>
            <button class="amt-btn" data-amt="100">$100</button>
            <button class="amt-btn" data-amt="250">$250</button>
            <button class="amt-btn" data-amt="500">$500</button>
        </div>
        <div class="custom-wrap">
            <span class="dollar">$</span>
            <input type="number" class="custom-input" id="customAmt" placeholder="Other amount" min="1">
        </div>

    <!-- Buttons -->
    <div class="btn-list">
        <button class="btn btn-pp" id="btnPP" disabled>
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"
                 class="btn-logo-only" alt="PayPal">
        </button>

        <button class="btn btn-vm" id="btnVM" disabled>
            <span class="venmo-btn-content">
                <div class="venmo-fake-logo">
                    <span class="venmo-fake-v">V</span>

                <span class="venmo-text-btn">venmo</span>

        </button>

        <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="#2a2a2a" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

        Secured by PayPal PYUSD · Powered by Solana
    </p>

<script>
    const API = "https://dkmgvtfkffovimoupnwe.supabase.co/functions/v1/invoice-create";
    let amount = null;

    const update = () => {
        const ok = amount && amount >= 1;
        ["btnPP","btnVM"].forEach(id => {
            document.getElementById(id).disabled = !ok;
        });
    };

    document.querySelectorAll(".amt-btn").forEach(b => {
        b.onclick = () => {
            document.querySelectorAll(".amt-btn").forEach(x => x.classList.remove("active"));
            b.classList.add("active");
            amount = Number(b.dataset.amt);
            document.getElementById("customAmt").value = "";
            update();
        };
    });

    document.getElementById("customAmt").oninput = e => {
        document.querySelectorAll(".amt-btn").forEach(x => x.classList.remove("active"));
        amount = e.target.value ? Number(e.target.value) : null;
        update();
    };

    async function pay(via) {
        const btnId = via === "PayPal" ? "btnPP" : "btnVM";
        const btn = document.getElementById(btnId);
        btn.classList.add("loading");
        document.getElementById("btnPP").disabled = true;
        document.getElementById("btnVM").disabled = true;
        try {
            const r = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    asset: "PYUSD",
                    network: "solana",
                    amount_usd: amount,
                    amount: String(amount),
                    note: via
                })
            });
            const d = await r.json();
            const id = d.invoice_id || d.id;
            if (id) window.location.href = `invoice.html?id=${id}`;
        } catch {
            alert("Something went wrong. Please try again.");
            btn.classList.remove("loading");
            update();
        }
    }

    document.getElementById("btnPP").onclick = () => pay("PayPal");
    document.getElementById("btnVM").onclick = () => pay("Venmo");
</script>
</body>
</html>
