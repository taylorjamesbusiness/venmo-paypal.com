<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay Rose</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 24px;
      padding: 36px 28px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 28px; }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #003087, #009cde);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin: 0 auto 14px;
      box-shadow: 0 4px 18px rgba(0,156,222,0.35);
    }

    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #888;
    }
    .badge .dot { width: 7px; height: 7px; background: #00c48c; border-radius: 50%; }

    /* ── Network selector ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .network-row {
      display: flex; gap: 8px; margin-bottom: 20px;
    }

    .net-btn {
      flex: 1;
      padding: 9px 4px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .net-btn:hover { border-color: #444; color: #ccc; }
    .net-btn.active {
      background: #0a1628;
      border-color: #009cde;
      color: #009cde;
    }

    /* ── Amount presets ── */
    .amounts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .amt-btn {
      padding: 13px 6px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 14px;
      color: #ccc;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .amt-btn:hover { border-color: #444; }
    .amt-btn.active {
      background: #0a1628;
      border-color: #009cde;
      color: #009cde;
    }

    .show-more {
      background: none;
      border: none;
      color: #555;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0 10px;
      display: flex; align-items: center; gap: 4px;
    }
    .show-more:hover { color: #888; }

    /* ── Custom amount ── */
    .email-wrap {           display: flex;           align-items: center;           background: #1a1a1a;           border: 1.5px solid #222;           border-radius: 14px;           padding: 0 14px;           margin-bottom: 14px;           transition: border-color 0.2s;         }         .email-wrap:focus-within { border-color: #009cde; }         .email-icon { color: #555; margin-right: 8px; font-size: 16px; }         .email-input {           background: transparent;           border: none;           outline: none;           color: #fff;           font-size: 15px;           padding: 14px 0;           width: 100%;         }         .email-input::placeholder { color: #555; }          .custom-wrap {
      position: relative; margin-bottom: 20px;
    }
    .custom-wrap .currency {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 18px; color: #555; pointer-events: none;
    }
    .custom-input {
      width: 100%;
      padding: 15px 16px 15px 34px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 14px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.18s;
    }
    .custom-input:focus { border-color: #009cde; }
    .custom-input::placeholder { color: #333; }

    /* ── Pay buttons ── */
    .pay-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap-10px;
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }

    .btn-paypal {
      background: linear-gradient(135deg, #009cde, #003087);
      color: #fff;
      box-shadow: 0 4px 18px rgba(0,156,222,0.3);
    }
    .btn-paypal:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,156,222,0.45); }

    .btn-venmo {
      background: linear-gradient(135deg, #3d95ce, #008acf);
      color: #fff;
      box-shadow: 0 4px 18px rgba(61,149,206,0.3);
    }
    .btn-venmo:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(61,149,206,0.45); }

    .pay-btn:active { transform: translateY(0); }
    .pay-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-icon { font-size: 20px; margin-right: 8px; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 4px 0 10px;
      color: #333; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #222;
    }

    /* ── Footer ── */
    .footer {
      text-align: center; margin-top: 20px;
      font-size: 11px; color: #444;
    }
    .footer span { color: #009cde; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1e1e1e; border: 1px solid #333;
      color: #fff; padding: 12px 22px;
      border-radius: 12px; font-size: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-color: #00c48c; color: #00c48c; }
    .toast.error   { border-color: #ff4d4f; color: #ff4d4f; }

    /* ── Invoice result ── */
    .result-box {
      display: none;
      margin-top: 18px;
      background: #0d1f0d;
      border: 1px solid #1a3a1a;
      border-radius: 16px;
      padding: 18px;
    }
    .result-box.visible { display: block; }
    .result-label { font-size: 11px; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.6px; }
    .result-addr {
      font-size: 13px; color: #00c48c;
      word-break: break-all; margin-bottom: 14px;
      cursor: pointer;
    }
    .result-addr:hover { text-decoration: underline; }
    .result-meta { font-size: 12px; color: #555; }
    .result-meta span { color: #888; }

    @media (max-width: 440px) {
      .card { border-radius: 0; border-left: none; border-right: none; min-height: 100dvh; padding: 40px 20px 28px; }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="header">
    <div class="avatar">₱</div>
    <h1>Pay Rose</h1>
    <div class="badge">
      <span class="dot"></span>
      PYUSD · PayPal · Venmo · On-chain
    </div>
  </div>

  <!-- Network -->
  <p class="section-label">Network</p>
  <div class="network-row">
    <button class="net-btn active" data-net="ethereum">Ethereum</button>
    <button class="net-btn"        data-net="arbitrum">Arbitrum</button>
    <button class="net-btn"        data-net="solana">Solana</button>
  </div>

  <!-- Preset amounts -->
  <p class="section-label">Select Amount</p>
  <div class="amounts-grid" id="presets">
    <button class="amt-btn" data-amt="10">$10</button>
    <button class="amt-btn" data-amt="15">$15</button>
    <button class="amt-btn" data-amt="20">$20</button>
    <button class="amt-btn" data-amt="25">$25</button>
    <button class="amt-btn" data-amt="50">$50</button>
    <button class="amt-btn" data-amt="100">$100</button>
  </div>

  <button class="show-more" id="showMore">▾ Show more amounts</button>

  <div id="extraAmounts" style="display:none">
    <div class="amounts-grid" style="margin-bottom:8px">
      <button class="amt-btn" data-amt="150">$150</button>
      <button class="amt-btn" data-amt="200">$200</button>
      <button class="amt-btn" data-amt="500">$500</button>
    </div>
  </div>

  <!-- Custom amount -->
  <div class="custom-wrap">
    <span class="currency">$</span>
    <input
      class="custom-input"
      id="customAmt"
      type="number"
      min="1"
      max="2000"
      placeholder="Custom amount"
      aria-label="Custom amount"
      aria-valuemin="1"
    />
  </div>

  <!-- Email input -->         <div class="email-wrap">           <span class="email-icon">&#9993;</span>           <input             class="email-input"             id="recipientEmail"             type="email"             placeholder="Your email address"             autocomplete="email"             required           />         </div>          <!-- Pay buttons -->
  <button class="pay-btn btn-paypal" id="btnPaypal" disabled>
    <span class="btn-icon">🅿️</span> Pay with PayPal
  </button>

  <div class="divider">or</div>

  <button class="pay-btn btn-venmo" id="btnVenmo" disabled>
    <span class="btn-icon">💙</span> Pay with Venmo
  </button>

  <!-- Invoice result -->
  <div class="result-box" id="resultBox">
    <p class="result-label">Send PYUSD to this address</p>
    <p class="result-addr" id="resultAddr" title="Click to copy"></p>
    <p class="result-meta">
      Invoice: <span id="resultCode"></span> &nbsp;·&nbsp;
      Expires: <span id="resultExpiry"></span>
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">Powered by <span>PayPal PYUSD</span></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Config ───────────────────────────────────────────────
  // Replace with your Supabase edge function URL
  const API_URL = "https://dkmgvtfkffovimoupnwe.supabase.co/functions/v1/invoice-create";

  // ── State ────────────────────────────────────────────────
  let selectedNetwork = "ethereum";
  let selectedAmount  = null;

  // ── Network buttons ──────────────────────────────────────
  document.querySelectorAll(".net-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".net-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedNetwork = btn.dataset.net;
    });
  });

  // ── Preset amount buttons ────────────────────────────────
  document.querySelectorAll(".amt-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".amt-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedAmount = Number(btn.dataset.amt);
      document.getElementById("customAmt").value = "";
      updatePayButtons();
    });
  });

  // ── Custom amount input ──────────────────────────────────
  document.getElementById("customAmt").addEventListener("input", (e) => {
    document.querySelectorAll(".amt-btn").forEach(b => b.classList.remove("active"));
    selectedAmount = e.target.value ? Number(e.target.value) : null;
    updatePayButtons();
  });

  // ── Show more ────────────────────────────────────────────
  let moreShown = false;
  document.getElementById("showMore").addEventListener("click", () => {
    moreShown = !moreShown;
    document.getElementById("extraAmounts").style.display = moreShown ? "block" : "none";
    document.getElementById("showMore").textContent = moreShown ? "▴ Show less" : "▾ Show more amounts";
  });

  // ── Enable/disable pay buttons ───────────────────────────
  function updatePayButtons() {
    const valid = selectedAmount && selectedAmount >= 1 && selectedAmount <= 2000;
    document.getElementById("btnPaypal").disabled = !valid;
    document.getElementById("btnVenmo").disabled  = !valid;
  }

  // ── Toast helper ─────────────────────────────────────────
  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => { t.className = "toast"; }, 3200);
  }

  // ── Create invoice ───────────────────────────────────────
  async function createInvoice(via) {
    const btnPaypal = document.getElementById("btnPaypal");
    const btnVenmo  = document.getElementById("btnVenmo");
    btnPaypal.disabled = true;
    btnVenmo.disabled  = true;
    btnPaypal.textContent = "Creating…";
    btnVenmo.textContent  = "Creating…";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          asset:       "PYUSD",
          network:     selectedNetwork,
          amount_usd:  selectedAmount,
          amount: String(selectedAmount),             recipient_email: document.getElementById('recipientEmail').value.trim(),             note: via === 'paypal' ? 'PayPal PYUSD' : 'Venmo PYUSD',   // "paypal" or "venmo"
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Invoice creation failed");

      const inv = data.invoice;

      // Show result
      const addrEl  = document.getElementById("resultAddr");
      addrEl.textContent = inv.deposit_address;
      addrEl.onclick = () => {
        navigator.clipboard.writeText(inv.deposit_address);
        showToast("Address copied!", "success");
      };

      document.getElementById("resultCode").textContent   = inv.invoice_code;
      document.getElementById("resultExpiry").textContent =
        new Date(inv.expires_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      document.getElementById("resultBox").classList.add("visible");
      showToast("Invoice created! Copy the address below.", "success");

    } catch (e) {
      showToast(e.message, "error");
    } finally {
      btnPaypal.disabled = false;
      btnVenmo.disabled  = false;
      btnPaypal.innerHTML = '<span class="btn-icon">🅿️</span> Pay with PayPal';
      btnVenmo.innerHTML  = '<span class="btn-icon">💙</span> Pay with Venmo';
      updatePayButtons();
    }
  }

  document.getElementById("btnPaypal").addEventListener("click", () => createInvoice("paypal"));
  document.getElementById("btnVenmo").addEventListener("click",  () => createInvoice("venmo"));
</script>
</body>
</html>
