<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay Rose | Premium Payment</title>
    <style>
        :root {
            --bg: #000;
            --card: #121212;
            --accent: #00D64F;
            --paypal: #0070ba;
            --venmo: #008CFF;
            --verified: #0095f6;
            --text: #fff;
            --text-dim: #777;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header & Verified Badge */
        .header { text-align: center; }
        .brand {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .verified-icon {
            width: 20px;
            height: 20px;
            filter: drop-shadow(0 0 4px rgba(0, 149, 246, 0.4));
            animation: glow 3s infinite ease-in-out;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px var(--verified)); }
            50% { filter: drop-shadow(0 0 8px var(--verified)); }
        }
        .tagline { font-size: 12px; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        /* Premium Card */
        .card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 30px;
            padding: 32px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: "";
            position: absolute;
            top: -50%; right: -50%;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .card-logos { display: flex; gap: 16px; align-items: center; }
        .card-logo-img { height: 22px; width: auto; }
        
        .solana-tag {
            background: rgba(20, 241, 149, 0.08);
            border: 1px solid rgba(20, 241, 149, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .solana-tag span { font-size: 11px; font-weight: 800; color: #14F195; letter-spacing: 0.5px; }

        .card-body h4 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .card-body p { font-size: 22px; font-weight: 700; }

        /* Selection area */
        .selection {
            background: #0a0a0a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #151515;
        }
        .amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .amt-btn {
            background: #151515;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px 0;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .amt-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .custom-wrap { position: relative; }
        .custom-wrap span { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #444; font-weight: 700; }
        .custom-input {
            width: 100%;
            background: #151515;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px 16px 16px 32px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
        }
        .custom-input:focus { border-color: #444; }

        /* Buttons */
        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn-pp { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        .btn-pp:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,255,255,0.2); }
        
        .btn-vm { 
            background: #008CFF; 
            color: #fff; 
            box-shadow: 0 4px 15px rgba(0, 140, 255, 0.2); 
        }
        .btn-vm:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 140, 255, 0.4); }

        .btn-logo { height: 20px; width: auto; }

        .footer { text-align: center; font-size: 10px; color: #222; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="brand">
                Pay Rose
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg" class="verified-icon" alt="V">
            </div>
            <p class="tagline">Secure Crypto Checkout</p>
        </div>

        <div class="card">
            <div class="card-top">
                <div class="card-logos">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="card-logo-img" alt="PayPal">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Venmo_logo.svg" class="card-logo-img" alt="Venmo" style="filter: brightness(0) invert(1);">
                </div>
                <div class="solana-tag">
                    <svg width="14" height="14" viewBox="0 0 397 311"><path d="M64.6 237.9c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6c-2.4-2.4-5.7-3.7-9.2-3.7H4.6c-5.8 0-8.7 7-4.6 11.1l64.6 64.6zM332.4 73.1c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6zM332.4 155.5c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6z" fill="#14F195"/></svg>
                    <span>SOLANA</span>
                </div>
            </div>
            <div class="card-body">
                <h4>Asset Support</h4>
                <p>PYUSD Stablecoin</p>
            </div>
        </div>

        <div class="selection">
            <div class="amounts">
                <button class="amt-btn" data-amt="10">$10</button>
                <button class="amt-btn" data-amt="25">$25</button>
                <button class="amt-btn" data-amt="50">$50</button>
                <button class="amt-btn" data-amt="100">$100</button>
                <button class="amt-btn" data-amt="250">$250</button>
                <button class="amt-btn" data-amt="500">$500</button>
            </div>
            <div class="custom-wrap">
                <span>$</span>
                <input type="number" class="custom-input" id="customAmt" placeholder="Other amount">
            </div>
        </div>

        <div class="btn-list">
            <button class="btn btn-pp" id="btnPP" disabled>
                <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_37x23.jpg" class="btn-logo" alt="">
                Pay with PayPal
            </button>
            <button class="btn btn-vm" id="btnVM" disabled>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Venmo_logo.svg/2560px-Venmo_logo.svg.png" class="btn-logo" alt="" style="filter: brightness(0) invert(1);">
                Pay with Venmo
            </button>
        </div>

        <p class="footer">Securely processed via PayPal PYUSD on Solana</p>
    </div>

    <script>
        const API = "https://dkmgvtfkffovimoupnwe.supabase.co/functions/v1/invoice-create";
        let amount = null;

        const update = () => {
            const ok = amount && amount >= 1;
            document.getElementById("btnPP").disabled = !ok;
            document.getElementById("btnVM").disabled = !ok;
        };

        document.querySelectorAll(".amt-btn").forEach(b => {
            b.onclick = () => {
                document.querySelectorAll(".amt-btn").forEach(x => x.classList.remove("active"));
                b.classList.add("active");
                amount = Number(b.dataset.amt);
                document.getElementById("customAmt").value = "";
                update();
            };
        });

        document.getElementById("customAmt").oninput = (e) => {
            document.querySelectorAll(".amt-btn").forEach(x => x.classList.remove("active"));
            amount = e.target.value ? Number(e.target.value) : null;
            update();
        };

        async function pay(via) {
            document.getElementById("btnPP").disabled = true;
            document.getElementById("btnVM").disabled = true;
            try {
                const r = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        asset: "PYUSD",
                        network: "solana",
                        amount_usd: amount,
                        amount: String(amount),
                        note: via
                    }),
                });
                const d = await r.json();
                const id = d.invoice_id || d.id;
                if (id) window.location.href = `invoice.html?id=${id}`;
            } catch (e) {
                alert("Error. Please try again.");
                update();
            }
        }

        document.getElementById("btnPP").onclick = () => pay("PayPal");
        document.getElementById("btnVM").onclick = () => pay("Venmo");
    </script>
</body>
</html>
