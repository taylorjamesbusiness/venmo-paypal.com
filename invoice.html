<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice | Pay Rose</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-black: #050505;
            --card-bg: #111111;
            --solana-green: #14F195;
            --accent-green: #00D64F;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            min-height: 100dvh;
            background: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Invoice Card */
        .invoice-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 32px 24px;
            border: 1px solid #1a1a1a;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .amount-due {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 214, 79, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .qr-wrapper {
            background: #fff;
            padding: 16px;
            border-radius: 24px;
            display: inline-block;
            margin-bottom: 24px;
            position: relative;
        }

        .qr-center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Timer */
        .timer-strip {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .timer-label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
        .timer-clock { font-family: monospace; font-size: 18px; font-weight: 700; color: #fff; }

        /* Details List */
        .details-list {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid #1a1a1a;
            overflow: hidden;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #1a1a1a;
        }

        .detail-item:last-child { border-bottom: none; }
        .label { font-size: 13px; color: var(--text-dim); }
        .value { font-size: 13px; font-weight: 600; color: #fff; }

        /* Address Box */
        .address-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            text-align: left;
        }

        .addr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .solana-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--solana-green);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .addr-text {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-dim);
            word-break: break-all;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .copy-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn.copied { background: var(--accent-green); }

        /* Help Section */
        .help-btn {
            background: none;
            border: 1px solid #222;
            color: var(--text-dim);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        #loading { text-align: center; padding: 100px 0; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="javascript:history.back()" class="back-link">← Cancel</a>
            <button class="help-btn">Need help?</button>
        </div>

        <div id="loading">Loading invoice...</div>

        <div id="content" style="display:none">
            <div class="invoice-card">
                <div class="status-badge" id="inv-status">Awaiting Payment</div>
                <div class="amount-due" id="inv-amount">$0.00</div>
                <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 24px;">PYUSD on Solana</p>
                
                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                    <div class="qr-center-logo">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/PayPal_PYUSD_Logo.svg/512px-PayPal_PYUSD_Logo.svg.png" width="24" alt="">
                    </div>
                </div>

                <div class="timer-strip">
                    <span class="timer-label">Expires in</span>
                    <span class="timer-clock" id="countdown">60:00</span>
                </div>
            </div>

            <div class="details-list" style="margin-top: 20px;">
                <div class="detail-item">
                    <span class="label">Reference</span>
                    <span class="value" id="inv-code">—</span>
                </div>
                <div class="detail-item">
                    <span class="label">Network</span>
                    <span class="value" style="color: var(--solana-green)">Solana (SPL)</span>
                </div>
            </div>

            <div class="address-box" style="margin-top: 20px;">
                <div class="addr-header">
                    <span class="solana-tag">
                        <svg width="12" height="12" viewBox="0 0 397 311" fill="currentColor"><path d="M64.6 237.9c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6c-2.4-2.4-5.7-3.7-9.2-3.7H4.6c-5.8 0-8.7 7-4.6 11.1l64.6 64.6zM332.4 73.1c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6zM332.4 155.5c-2.4-2.4-5.7-3.7-9.2-3.7H8.4c-5.8 0-8.7 7-4.6 11.1l64.6 64.6c2.4 2.4 5.7 3.7 9.2 3.7h314.8c5.8 0 8.7-7 4.6-11.1l-64.6-64.6z"/></svg>
                        Solana Address
                    </span>
                </div>
                <p class="addr-text" id="inv-address">—</p>
                <button class="copy-btn" id="copyBtn" onclick="copyAddress()">Copy Address</button>
            </div>
        </div>
    </div>

    <script>
        const EDGE_URL = "https://dkmgvtfkffovimoupnwe.supabase.co/functions/v1";
        let invoice = null;
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        async function load() {
            if (!id) return;
            try {
                const res = await fetch(`${EDGE_URL}/get-invoice?id=${id}`);
                invoice = await res.json();
                document.getElementById("loading").style.display = "none";
                document.getElementById("content").style.display = "block";
                
                document.getElementById("inv-amount").textContent = `$${Number(invoice.amount_usd).toFixed(2)}`;
                document.getElementById("inv-code").textContent = invoice.invoice_code;
                document.getElementById("inv-address").textContent = invoice.wallet_address || invoice.deposit_address;
                
                new QRCode(document.getElementById("qrcode"), {
                    text: invoice.wallet_address || invoice.deposit_address,
                    width: 180,
                    height: 180,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                startTimer(new Date(invoice.expires_at).getTime());
            } catch (e) {
                document.getElementById("loading").textContent = "Invoice not found.";
            }
        }

        function startTimer(expiresAt) {
            const tick = () => {
                const diff = expiresAt - Date.now();
                if (diff <= 0) {
                    document.getElementById("countdown").textContent = "00:00";
                    document.getElementById("inv-status").textContent = "Expired";
                    document.getElementById("inv-status").style.color = "#ff4d4f";
                    document.getElementById("inv-status").style.background = "rgba(255, 77, 79, 0.1)";
                    return;
                }
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById("countdown").textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            };
            tick();
            setInterval(tick, 1000);
        }

        function copyAddress() {
            const addr = invoice.wallet_address || invoice.deposit_address;
            navigator.clipboard.writeText(addr).then(() => {
                const btn = document.getElementById("copyBtn");
                btn.textContent = "Copied!";
                btn.classList.add("copied");
                setTimeout(() => {
                    btn.textContent = "Copy Address";
                    btn.classList.remove("copied");
                }, 2000);
            });
        }

        load();
    </script>
</body>
</html>
